apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
      - name: ai-service
        image: spezielle-programmierung-ai-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-secret
              key: OPENAI_API_KEY
        - name: DATA_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: ai-service-config
              key: DATA_SERVICE_URL
        - name: OPENAI_MODEL
          valueFrom:
            configMapKeyRef:
              name: ai-service-config
              key: OPENAI_MODEL